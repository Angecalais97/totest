name: DevSecOps CI/CD – Security, Quality, ECR & Deploy

on:
  push:
    branches:
      - main

jobs:
  security:
    name: 🔐 Security, Quality & Image Build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
    # 1️⃣ Checkout code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2️⃣ Secret scanning (HARD STOP)
    - name: Secret scan with Gitleaks
      uses: gitleaks/gitleaks-action@v2

    # 3️⃣ Trivy filesystem scan
    - name: Trivy filesystem scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        format: sarif
        output: trivy-fs.sarif
        severity: CRITICAL,HIGH
        exit-code: 1

    - name: Upload Trivy FS SARIF
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-fs.sarif
        category: trivy-filesystem

    # 4️⃣ SonarQube static analysis
    - name: SonarQube Scan
      uses: sonarsource/sonarqube-scan-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    # 5️⃣ SonarQube Quality Gate (BLOCKING)
    - name: SonarQube Quality Gate
      uses: sonarsource/sonarqube-quality-gate-action@v1
      timeout-minutes: 5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    # 6️⃣ Build Docker image
    - name: Build Docker image
      run: docker build -t totest-site:latest .

    # 7️⃣ Trivy image scan
    - name: Trivy image scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: totest-site:latest
        format: sarif
        output: trivy-image.sarif
        severity: CRITICAL,HIGH
        exit-code: 0

    - name: Upload Trivy Image SARIF
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-image.sarif
        category: trivy-image

    # 8️⃣ Configure AWS credentials
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # 9️⃣ Login to Amazon ECR
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    # 🔟 Push image to Amazon ECR (FINAL SECURITY OUTCOME)
    - name: Push image to Amazon ECR
      env:
        AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        AWS_REGION: ${{ secrets.AWS_REGION }}
      run: |
        ECR_REGISTRY=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
        ECR_REPOSITORY=totest
        IMAGE_TAG=latest

        docker tag totest-site:latest $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy:
    name: 🚀 Deploy GitHub Pages (END)
    runs-on: ubuntu-latest
    needs: security

    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup GitHub Pages
      uses: actions/configure-pages@v4

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: .

    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4

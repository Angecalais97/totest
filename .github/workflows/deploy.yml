name: DevSecOps CI – Full Scan, Reports & Deploy

on:
  push:
    branches:
      - main

jobs:
  security:
    name: DevSecOps Security Scans
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Secret scan with Gitleaks
      uses: gitleaks/gitleaks-action@v2

    - name: Trivy filesystem scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        format: sarif
        output: trivy-fs.sarif
        severity: CRITICAL,HIGH
        exit-code: 1

    - name: Upload Trivy FS scan
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-fs.sarif
        category: trivy-filesystem

    - name: Build Docker image
      run: docker build -t totest-site .

    - name: Trivy image scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: totest-site
        format: sarif
        output: trivy-image.sarif
        severity: CRITICAL,HIGH
        exit-code: 1

    - name: Upload Trivy Image scan
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-image.sarif
        category: trivy-image

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          trivy-fs.sarif
          trivy-image.sarif

  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: security

    permissions:
      contents: write   # 🔐 write ONLY here

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Deploy GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .

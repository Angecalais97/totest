name: DevSecOps CI – Tests, Scans, Reports & Deploy

on:
  push:
    branches:
      - main

jobs:
  security:
    name: Tests & Security Scans
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
    # 1️⃣ Checkout
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2️⃣ Setup Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    # 3️⃣ Install test dependencies
    - name: Install test dependencies
      run: |
        npm init -y
        npm install --save-dev \
          html-validate \
          stylelint \
          stylelint-config-standard \
          stylelint-sarif-formatter

    # 4️⃣ HTML unit tests (with JSON to SARIF conversion)
    - name: Run HTML unit tests
      run: |
        # Generate JSON report
        ./node_modules/.bin/html-validate index.html --formatter json > html-validate.json
        
        # Convert JSON to SARIF using Node.js
        node -e "
        const fs = require('fs');
        const results = JSON.parse(fs.readFileSync('html-validate.json', 'utf8'));
        
        // Create SARIF report
        const sarifReport = {
          \$schema: 'https://json.schemastore.org/sarif-2.1.0',
          version: '2.1.0',
          runs: [{
            tool: {
              driver: {
                name: 'html-validate',
                version: '8.0.0',
                informationUri: 'https://html-validate.org/'
              }
            },
            results: results.map(error => ({
              level: error.severity === 2 ? 'error' : 'warning',
              message: {
                text: error.message
              },
              locations: [{
                physicalLocation: {
                  artifactLocation: {
                    uri: error.fileName || 'index.html'
                  },
                  region: {
                    startLine: error.line || 1,
                    startColumn: error.column || 1
                  }
                }
              }],
              ruleId: error.rule
            }))
          }]
        };
        
        fs.writeFileSync('html-validate.sarif', JSON.stringify(sarifReport, null, 2));
        "

    # 5️⃣ CSS unit tests (using dedicated SARIF formatter)
    - name: Run CSS unit tests
      run: |
        # Generate JSON report for artifact upload
        ./node_modules/.bin/stylelint style.css --formatter json > stylelint.json
        # Generate SARIF report for GitHub Security tab
        ./node_modules/.bin/stylelint style.css --formatter stylelint-sarif-formatter > stylelint.sarif

    # 6️⃣ Upload HTML test results
    - name: Upload HTML test SARIF
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: html-validate.sarif
        category: html-unit-tests

    # 7️⃣ Upload CSS test results
    - name: Upload CSS test SARIF
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: stylelint.sarif
        category: css-unit-tests

    # 8️⃣ Secret scan
    - name: Secret scan with Gitleaks
      uses: gitleaks/gitleaks-action@v2

    # 9️⃣ Trivy filesystem scan
    - name: Trivy filesystem scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        format: sarif
        output: trivy-fs.sarif
        severity: CRITICAL,HIGH
        exit-code: 1

    # 🔟 Upload Trivy FS SARIF
    - name: Upload Trivy FS SARIF
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-fs.sarif
        category: trivy-filesystem

    # 1️⃣1️⃣ Build Docker image
    - name: Build Docker image
      run: docker build -t totest-site .

    # 1️⃣2️⃣ Trivy image scan
    - name: Trivy image scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: totest-site
        format: sarif
        output: trivy-image.sarif
        severity: CRITICAL,HIGH
        exit-code: 1

    # 1️⃣3️⃣ Upload Trivy image SARIF
    - name: Upload Trivy Image SARIF
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-image.sarif
        category: trivy-image

    # 1️⃣4️⃣ Upload all reports
    - name: Upload all reports
      uses: actions/upload-artifact@v4
      with:
        name: reports
        path: |
          html-validate.json
          html-validate.sarif
          stylelint.json
          stylelint.sarif
          trivy-fs.sarif
          trivy-image.sarif

  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: security

    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
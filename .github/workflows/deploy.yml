name: DevSecOps CI – Full Scan, Reports & Deploy

on:
  push:
    branches:
      - main

permissions:        # 🔐 Workflow-level permissions
  contents: read
  security-events: write

jobs:
  devsecops:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2️⃣ Gitleaks
    - name: Secret scan with Gitleaks
      uses: gitleaks/gitleaks-action@v2

    # 3️⃣ Trivy FS (SARIF)
    - name: Trivy filesystem scan (SARIF)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        format: sarif
        output: trivy-fs.sarif
        severity: CRITICAL,HIGH
        exit-code: 1

    # 4️⃣ Upload FS SARIF
    - name: Upload FS scan
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-fs.sarif

    # 5️⃣ Docker build
    - name: Build Docker image
      run: docker build -t totest-site .

    # 6️⃣ Trivy Image (SARIF)
    - name: Trivy image scan (SARIF)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: totest-site
        format: sarif
        output: trivy-image.sarif
        severity: CRITICAL,HIGH
        exit-code: 1

    # 7️⃣ Upload Image SARIF
    - name: Upload Image scan
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-image.sarif

    # 8️⃣ Upload artifacts
    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          trivy-fs.sarif
          trivy-image.sarif

    # 9️⃣ Deploy GitHub Pages
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .

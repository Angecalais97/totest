name: DevSecOps CI/CD – Security, Quality & Deploy

on:
  push:
    branches:
      - main

jobs:
  security:
    name: Security & Quality Gates
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 🔐 1️⃣ Secrets = HARD STOP
    - name: Secret scan with Gitleaks
      uses: gitleaks/gitleaks-action@v2

    # 🔎 2️⃣ Repo vulnerabilities
    - name: Trivy filesystem scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        format: sarif
        output: trivy-fs.sarif
        severity: CRITICAL,HIGH
        exit-code: 1

    - name: Upload Trivy FS SARIF
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-fs.sarif
        category: trivy-filesystem

    # 📊 3️⃣ Code quality
    - name: SonarQube Scan
      uses: sonarsource/sonarqube-scan-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    # ⛔ 4️⃣ Quality Gate
    - name: SonarQube Quality Gate
      uses: sonarsource/sonarqube-quality-gate-action@v1
      timeout-minutes: 5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    # 🐳 5️⃣ Build container (only if gates passed)
    - name: Build Docker image
      run: docker build -t totest-site .

    # 🔎 6️⃣ Container vulnerabilities
    - name: Trivy image scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: totest-site
        format: sarif
        output: trivy-image.sarif
        severity: CRITICAL,HIGH
        exit-code: 1

    - name: Upload Trivy Image SARIF
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-image.sarif
        category: trivy-image

  deploy:
    name: 🚀 Deploy (END OF PIPELINE)
    runs-on: ubuntu-latest
    needs: security   # 👈 THIS IS THE END CONDITION

    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup GitHub Pages
      uses: actions/configure-pages@v4

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: .

    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4

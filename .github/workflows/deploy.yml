name: DevSecOps CI – Tests, Scans, Reports & Deploy

on:
  push:
    branches:
      - main

jobs:
  security:
    name: Tests & Security Scans
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
    # 1️⃣ Checkout
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2️⃣ Setup Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    # 3️⃣ Install test dependencies
    - name: Install test dependencies
      run: |
        npm init -y
        npm install --save-dev \
          html-validate \
          stylelint \
          stylelint-config-standard \
          @microsoft/eslint-formatter-sarif

    # 4️⃣ HTML unit tests (FIXED - using direct path)
    - name: Run HTML unit tests
      run: |
        ./node_modules/.bin/html-validate index.html --formatter json > html-validate.json
        ./node_modules/.bin/@microsoft/eslint-formatter-sarif html-validate.json > html-validate.sarif

    # 5️⃣ CSS unit tests (FIXED - using direct path)
    - name: Run CSS unit tests
      run: |
        ./node_modules/.bin/stylelint style.css --formatter json > stylelint.json
        ./node_modules/.bin/@microsoft/eslint-formatter-sarif stylelint.json > stylelint.sarif

    # 6️⃣ Upload HTML test results
    - name: Upload HTML test SARIF
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: html-validate.sarif
        category: html-unit-tests

    # 7️⃣ Upload CSS test results
    - name: Upload CSS test SARIF
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: stylelint.sarif
        category: css-unit-tests

    # 8️⃣ Secret scan
    - name: Secret scan with Gitleaks
      uses: gitleaks/gitleaks-action@v2

    # 9️⃣ Trivy filesystem scan
    - name: Trivy filesystem scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        format: sarif
        output: trivy-fs.sarif
        severity: CRITICAL,HIGH
        exit-code: 1

    # 🔟 Upload Trivy FS SARIF
    - name: Upload Trivy FS SARIF
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-fs.sarif
        category: trivy-filesystem

    # 1️⃣1️⃣ Build Docker image
    - name: Build Docker image
      run: docker build -t totest-site .

    # 1️⃣2️⃣ Trivy image scan
    - name: Trivy image scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: totest-site
        format: sarif
        output: trivy-image.sarif
        severity: CRITICAL,HIGH
        exit-code: 1

    # 1️⃣3️⃣ Upload Trivy image SARIF
    - name: Upload Trivy Image SARIF
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-image.sarif
        category: trivy-image

    # 1️⃣4️⃣ Upload all reports
    - name: Upload all reports
      uses: actions/upload-artifact@v4
      with:
        name: reports
        path: |
          html-validate.json
          html-validate.sarif
          stylelint.json
          stylelint.sarif
          trivy-fs.sarif
          trivy-image.sarif

  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: security

    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .
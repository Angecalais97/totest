name: DevSecOps CI – Full Scan, Reports & Deploy

on:
  push:
    branches:
      - main

# 🔐 Workflow-level least privilege
permissions:
  contents: read
  security-events: write

jobs:
  devsecops:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2️⃣ Secret scan (Gitleaks)
    - name: Secret scan with Gitleaks
      uses: gitleaks/gitleaks-action@v2

    # 3️⃣ Trivy filesystem scan (SARIF)
    - name: Trivy filesystem scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        format: sarif
        output: trivy-fs.sarif
        severity: CRITICAL,HIGH
        exit-code: 1

    # 4️⃣ Upload FS scan to GitHub Security (UNIQUE CATEGORY)
    - name: Upload Trivy FS scan to Security tab
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-fs.sarif
        category: trivy-filesystem

    # 5️⃣ Docker build
    - name: Build Docker image
      run: docker build -t totest-site .

    # 6️⃣ Trivy image scan (SARIF)
    - name: Trivy image scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: totest-site
        format: sarif
        output: trivy-image.sarif
        severity: CRITICAL,HIGH
        exit-code: 1

    # 7️⃣ Upload Image scan to GitHub Security (UNIQUE CATEGORY)
    - name: Upload Trivy Image scan to Security tab
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-image.sarif
        category: trivy-image

    # 8️⃣ Upload reports as artifacts
    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          trivy-fs.sarif
          trivy-image.sarif

    # 9️⃣ Deploy to GitHub Pages
    - name: Deploy GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .
